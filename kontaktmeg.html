<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="stylesheet" href="kontaktmeg.css">
    <title>Kontakt meg</title>
</head>
<body>
    <img id="logo" class="logo" src="logo.png" alt="logo">
    <i id="openclose" class="fa-solid fa-bars"></i>
    <button class="h" id="h">Hjem</button>
    <button class="h" id="h1">Om GjøDev</button>
    <button class="h" id="h2">Prosjekter</button>
    <button class="h" id="h3">Kontakt meg</button>

    <nav id="nav">
        <button id="hjem">Hjem</button>
        <button id="omGjøDev">Om GjøDev</button>
        <button id="prosjekter">Prosjekter</button>
        <button id="kontaktmeg">Kontakt meg</button>
    </nav>

    <h1 class="kontaktinfo">Kontaktinformasjon</h1>
    <i class="fa-solid fa-envelope fafa"></i>
    <p class="epostadresse">post@gjodev.no / support@gjodev.no</p>

    <h1 class="sendmeld">Send meg en melding :)</h1>

    <form action="https://formspree.io/f/xldwarqz" method="POST">
        <i class="fa-solid fa-user"></i>
        <input type="text" class="fulltnavn" name="Fullt Navn" id="fulltnavn" placeholder="Fullt navn" required>
        <i class="fa-solid fa-envelope"></i>
        <input type="email" class="epost" name="E-post" id="epost" placeholder="E-post" required>
        <i class="fa-solid fa-phone"></i>
        <input type="tel" class="mobilnummer" name="Mobilnummer" id="mobilnummer" placeholder="Telefonnummer (inkl. landskode)" required>
        <i class="fa-solid fa-message"></i>
        <textarea class="beskjed" name="Beskjed" id="beskjed" placeholder="Skriv din melding her ..." required></textarea>
        <button type="submit">Send inn</button>
    </form>

    <img class="papirfly" src="paperplane.svg" alt="papirfly dekorasjon">

    <footer class="footer">
        <img id="logo2" class="logo2" src="logo.png" alt="logo">
        <p class="creds">Denne nettsiden er utviklet og designet av GjøDev.</p>
    </footer>



    <script src="https://kit.fontawesome.com/79b9943344.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
